---
name: Update from go-tools template

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions: {}

jobs:
  update:
    uses: hugoh/go-tools/.github/workflows/go-template-update.yml@f96c093130d5b6850c2fd66ce55818de447afbe9
    permissions:
      contents: write
      pull-requests: write
    secrets:
      gh_token: ${{ secrets.TEMPLATE_UPDATE_TOKEN }}

---
name: Update from go-tools template

on:
  schedule:
    - cron: "0 6 * * 1"
  repository_dispatch:
    types: [go-tools-updated]
  workflow_dispatch: {}

permissions: {}

jobs:
  update:
    uses: hugoh/go-tools/.github/workflows/go-template-update.yml@528783e852e2e696f210acc4441b4c5983d396b0
    permissions:
      contents: write
      pull-requests: write
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

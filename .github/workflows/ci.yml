---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  hk:
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - &checkout-full
        name: Checkout code with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0
      - &mise
        name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
      - name: hk checks
        run: hk check --no-progress --profile ci --all
      - name: Display hk log on failure
        if: failure()
        run: cat /home/runner/.local/state/hk/output.log

  goci:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - &go-version
        name: Get Go version
        id: go-version
        run: |
          GO_VERSION=$(grep '^go ' mise.toml | sed 's/.*"\(.*\)"/\1/')
          echo "go=${GO_VERSION}" >> "$GITHUB_OUTPUT"
      - &go-cache
        name: Cache Go modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ steps.go-version.outputs.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.go-version.outputs.go }}-
      - *mise
      - name: Lint
        run: mise lint
      - name: Test
        run: mise test
      - name: Integration tests
        run: mise test-int
      - name: Coverage
        run: mise covercheck
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Build
        run: go build .

  release:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [hk, goci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - *checkout-full
      - *go-version
      - *go-cache
      - *mise
      - name: Semver release
        uses: cocogitto/cocogitto-action@9a9fe03b31c47444290c0d7f9b1ee1b44ee13f20
        with:
          command: bump
          args: --auto
      - name: Push tag and Release
        run: |
          TAG=$(git tag --points-at HEAD | head -1)
          if [ -z "$TAG" ]; then
            echo "No tag at HEAD — skipping release"
          else
            echo "Pushing ${TAG}"
            git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $(echo -n "x-access-token:${GITHUB_TOKEN}" | base64)" push origin "${TAG}"
            echo "Releasing ${TAG}"
            goreleaser release --clean
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

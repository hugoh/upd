---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        type: choice
        description: "Version bump type"
        default: auto
        options: [auto, patch, minor, major]

permissions: {}

jobs:
  hk:
    uses: hugoh/go-tools/.github/workflows/go-hk.yml@ef068b07c1d6c9f9c8f09c05c75a66c75a61627b
    permissions:
      contents: read

  goci:
    uses: hugoh/go-tools/.github/workflows/go-ci.yml@ef068b07c1d6c9f9c8f09c05c75a66c75a61627b
    permissions:
      contents: read
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  release:
    needs: [hk, goci]
    uses: hugoh/go-tools/.github/workflows/go-release.yml@ef068b07c1d6c9f9c8f09c05c75a66c75a61627b
    permissions:
      contents: write
    with:
      bump_type: ${{ inputs.bump_type || 'auto' }}
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      tap_github_token: ${{ secrets.TAP_GITHUB_TOKEN }}

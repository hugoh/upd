name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.mise.outputs.tools }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false
      - uses: yshrsmz/action-mise-values@92f49c5a07ebc7ffa957be5efa6a2c673578bbb0
        id: mise

  lint:
    needs: versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - &checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false
      - &setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ fromJson(needs.versions.outputs.tools).go }}
      - uses: golangci/golangci-lint-action@46c9287ccb5fd9a896cb5705a7012084e34f6736
        with:
          version: v${{ fromJson(needs.versions.outputs.tools).golangci-lint }}

  test:
    needs: versions
    environment: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - *checkout
      - *setup-go
      - &setup-task
        name: Install Task
        uses: arduino/setup-task@77082889a3e84e008fbc86f7113cfc85a3a5ca8c
        with:
          version: ${{ fromJson(needs.versions.outputs.tools).task }}
      - name: Test
        run: task test
      - name: Coverage
        run: task covercheck
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: [versions, lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - *checkout
      - *setup-go
      - *setup-task
      - name: Build
        run: go build ./...

  release:
    runs-on: ubuntu-latest
    needs: [versions, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - *checkout
      - *setup-go
      - uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f
        with:
          allow-initial-development-versions: true
          hooks: goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

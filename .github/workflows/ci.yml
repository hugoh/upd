---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        type: choice
        description: "Version bump type"
        default: auto
        options: [auto, patch, minor, major]

permissions: {}

jobs:
  hk:
    uses: hugoh/go-tools/.github/workflows/go-hk.yml@a23b905fb3eee9e3f654a9ec065bf29e0653798e
    permissions:
      contents: read

  goci:
    uses: hugoh/go-tools/.github/workflows/go-ci.yml@a23b905fb3eee9e3f654a9ec065bf29e0653798e
    permissions:
      contents: read

  release:
    needs: [hk, goci]
    uses: hugoh/go-tools/.github/workflows/go-release.yml@a23b905fb3eee9e3f654a9ec065bf29e0653798e
    permissions:
      contents: write
    with:
      bump_type: ${{ inputs.bump_type || 'auto' }}
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      tap_github_token: ${{ secrets.TAP_GITHUB_TOKEN }}

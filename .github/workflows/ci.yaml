---
name: CI

on: # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:

env:
  # renovate: datasource=golang-version depName=go
  GO_VERSION: 1.26.1

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - &checkout
        name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false
      - &setup-go
        name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ env.GO_VERSION }}
      - &setup-task
        name: Install Task
        uses: arduino/setup-task@77082889a3e84e008fbc86f7113cfc85a3a5ca8c
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: task test
      - name: Check test coverage
        run: task covercheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - *checkout
      - *setup-go
      - *setup-task
      - name: Run linters
        run: task lint

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - *checkout
      - *setup-go
      - name: Build
        run: go build ./...

  release:
    name: Semantic Release
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
    steps:
      - *checkout
      - *setup-go
      - uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f
        with:
          hooks: goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

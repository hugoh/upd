version: "3"

vars:
  STATICDIR: internal/status/static
  COVEROUT: cover.out
  FUNCSOUT: funcs-{{.COVEROUT}}
  GOBIN: $(go env GOPATH)/bin
  TEST_COVERAGE: 80

tasks:
  default:
    deps: [dev]

  coverage:
    summary: Generate test coverage
    cmds:
      - task: test
        vars:
          CLI_ARGS: -coverprofile={{.COVEROUT}} -covermode=atomic -coverpkg=./...
    sources: &SOURCES
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.COVEROUT}}"

  coverfunc:
    summary: Generate test coverage function
    deps:
      - coverage
    cmd: go tool cover -func={{.COVEROUT}} > {{.FUNCSOUT}}
    sources:
      - "{{.COVEROUT}}"
    generates:
      - "{{.FUNCSOUT}}"

  covercheck:
    summary: Check test coverage
    deps:
      - coverfunc
    cmds:
      - cat {{.FUNCSOUT}}
      - |
        awk '/total/{gsub(/%/,"",$3); print "Coverage: " $3 "% (Minimum: {{.TEST_COVERAGE}}%)"; if ($3 < {{.TEST_COVERAGE}}) exit 1}' < "{{.FUNCSOUT}}"

  dev:
    summary: Development mode
    cmd: go run . {{.CLI_ARGS}}

  build:
    summary: Build application
    cmd: go build -o dist/upd .

  clean:
    summary: Clean the project
    cmds:
      - go clean
      - rm -f {{.COVEROUT}} {{.FUNCSOUT}}

  fixlint:
    summary: Fix lint issues
    sources: *SOURCES
    cmd: golangci-lint run --fix ./...

  fmt:
    summary: Format the code
    sources: *SOURCES
    cmds:
      - golangci-lint fmt ./...
      - prettier --write .

  tidy:
    summary: Tidy the module
    sources: *SOURCES
    cmd: go mod tidy -v

  depup:
    summary: Upgrades dependencies
    sources: *SOURCES
    cmds:
      - go get -u -t ./...
      - task: tidy

  lint:
    summary: Lint code
    sources: *SOURCES
    cmds:
      - go mod tidy -diff
      - golangci-lint run ./...
      - prettier --check .
      - goreleaser check

  ci:
    summary: Run CI checks (lint, test, coverage)
    cmds:
      - task: lint
      - task: test
      - task: covercheck

  test:
    summary: Run tests
    deps: [test-version]
    cmd: go test ./... {{.CLI_ARGS}}

  test-version:
    summary: Test that the application version is correctly injected at build time
    sources: *SOURCES
    cmd: go test -v -tags=integration ./internal

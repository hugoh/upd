[tools]
go = "1.26.5"
"go:github.com/vladopajic/go-test-coverage/v2" = "2.18.8"
golangci-lint = "2.12.2"
goreleaser = "2.17.0"
cocogitto = "7.0.0"
gotestsum = "1.13.0"
hk = "1.52.0"
rumdl = "0.2.34"
zizmor = "1.27.0"
biome = "2.5.4"
ghalint = "1.5.6"
gitleaks = "8.30.1"
actionlint = "1.7.12"
typos = "1.48.0"
pinact = "4.1.0"
copier = "9.17.0"
shellcheck = "0.11.0"
"github:anordal/shellharden" = "4.3.2"
shfmt = "3.13.1"
tombi = "1.2.0"
"github:owenlamont/ryl" = "0.21.0"
"npm:cpd" = "5.0.13"
"go:golang.org/x/tools/cmd/deadcode" = "0.48.0"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.6.0"

[env]
COVEROUT = "cover.out"

[settings]
task.timings = false

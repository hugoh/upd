version: "2"
linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - godoclint
    - noinlineerr
    - paralleltest
    - testpackage
    - wsl
    - wsl_v5
  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - err113
          - noctx
          - varnamelen
formatters:
  enable:
    - gci
    - gofumpt
    - goimports
    - golines
